databases:
  - name: finance-tracker-db
    databaseName: finance_tracker
    user: finance_tracker
    plan: free

services:
  - type: web
    name: finance-tracker-backend
    env: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python manage.py collectstatic --no-input
    startCommand: python manage.py migrate --run-syncdb && gunicorn finance_tracker.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: finance-tracker-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://finance-tracker-frontend.onrender.com
      # ── SendGrid email settings ──────────────────────────────────────────────
      # Set SENDGRID_API_KEY manually in the Render dashboard → Environment tab
      # (do NOT paste the key into this file)
      - key: SENDGRID_API_KEY
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: Finance Tracker <noreply@financetracker.com>

  - type: web
    name: finance-tracker-frontend
    env: static
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://finance-tracker-backend.onrender.com
