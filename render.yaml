databases:
  - name: finance-tracker-db
    databaseName: finance_tracker
    user: finance_tracker
    plan: free

services:
  # ── Backend: Django REST API ─────────────────────────────────────────────────
  - type: web
    name: finance-tracker-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn finance_tracker.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: finance-tracker-db
          property: connectionString
      - key: EMAIL_BACKEND
        value: smtp
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false        # Set to your Gmail address
      - key: EMAIL_HOST_PASSWORD
        sync: false        # Set to your Gmail App Password
      - key: CORS_ALLOWED_ORIGINS
        sync: false        # Set AFTER deploying frontend, e.g. https://finance-tracker-frontend.onrender.com

  # ── Frontend: React Static Site ──────────────────────────────────────────────
  - type: web
    name: finance-tracker-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false        # Set to backend URL: https://finance-tracker-backend.onrender.com
